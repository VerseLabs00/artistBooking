name: Deploy Frontend to Production

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: |
          # Use relative paths for the production API
          echo "VITE_API_BASE_URL=/api" > .env.production
          echo "VITE_API_URL=/api" >> .env.production
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'unimportant-value-will-be-skipped-by-disable-host-key-checking'
          if_key_exists: replace

      - name: Deploy to Ubuntu Server via Rsync
        run: |
          rsync -e "ssh -o StrictHostKeyChecking=no" -az --delete dist/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/performa.lk/dist/
